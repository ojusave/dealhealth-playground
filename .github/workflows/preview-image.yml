name: Publish preview image

on:
  workflow_dispatch:
  push:
    branches:
      - preview/workflows-comparison
    paths:
      - .github/workflows/preview-image.yml
      - .dockerignore
      - Dockerfile
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - packages/core/**
      - services/api/**
      - web/**

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ttl.sh/dealhealth-workflows-compare-${{ github.sha }}:24h
